<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharrowkin — Autonomous Dev Agent</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Custom Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDialog {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .animate-fade-in-overlay {
            animation: fadeInOverlay 0.4s ease-out forwards;
        }

        .animate-slide-up-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: fadeInDialog 0.5s ease-out forwards;
        }

        .bg-clip-text {
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* WOW Effects */
        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .gradient-border {
            position: relative;
            background: white;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #F26522, #ff8c42, #F26522);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gradient-border:hover::before {
            opacity: 1;
        }

        .shimmer-effect {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .animated-gradient {
            background: linear-gradient(-45deg, #F26522, #ff8c42, #F26522, #e05a1a);
            background-size: 400% 400%;
            animation: gradient 3s ease infinite;
        }

        .glow-on-hover {
            transition: box-shadow 0.3s ease;
        }

        .glow-on-hover:hover {
            box-shadow: 0 0 20px rgba(242, 101, 34, 0.4);
        }

        .scale-on-hover {
            transition: transform 0.3s ease;
        }

        .scale-on-hover:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className, fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ fill: fill }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('observe');

                { id: 'recall', label: 'Recall', icon: 'Brain' },
                { id: 'reason', label: 'Reason', icon: 'Lightbulb' },
                { id: 'stabilize', label: 'Stabilize', icon: 'Shield' }

            useEffect(() => {
                const interval = setInterval(() => {
                    setActiveTab((prev) => {
                        const currentIndex = tabs.findIndex(t => t.id === prev);

                    });

                return () => clearInterval(interval);

                            <span className="text-lg font-semibold tracking-tight text-black">Sharrowkin</span>

                            </div>

                                        </div>
                                        <h4 className="font-bold text-xl mb-1 text-gray-900">Code Generation</h4>
                                        <p className="text-gray-500 text-sm mb-4">Claude Opus 4.6</p>

                                        <div className="text-[10px] uppercase tracking-widest text-gray-400 mt-2">Context: 246KB loaded</div>
                                    </div>
                                )}

                                {activeTab === 'stabilize' && (
                                    <div className="animate-slide-up-overlay bg-white p-6 rounded-2xl shadow-2xl w-[320px] text-left">
                                        <h4 className="font-semibold mb-4 text-gray-900">Test & Validate</h4>
                                        <div className="space-y-3 mb-6">
                                            {['Running pytest suite', 'Analyzing failures', 'Auto-correcting errors', 'All tests passed'].map((text, i) => (
                                                <div key={i} className="flex items-center gap-3">
                                                    <Icon name="CheckCircle2" className="w-4 h-4 text-green-500" />
                                                    <span className="text-sm text-gray-600">{text}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <button className="w-full bg-black text-white py-2.5 rounded-xl font-medium text-sm">
                                            Commit Changes
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Company Logos */}
                        <div className="mt-24 flex flex-wrap items-center justify-center gap-x-12 gap-y-8 opacity-0 animate-fade-in-up" style={{ animationDelay: '0.8s' }}>
                            <span className="font-bold text-xl tracking-tighter text-gray-400">GITHUB</span>
                            <div className="flex items-center gap-1 font-bold text-xl text-gray-400">
                                <Icon name="Hash" className="w-5 h-5" /> SLACK
                            </div>
                            <div className="flex items-center gap-1 text-gray-400">
                                <div className="grid grid-cols-2 gap-0.5">
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                </div>

                            </div>
                            <span className="font-serif italic text-2xl text-gray-400 font-bold">Vercel</span>

                                <span className="tracking-widest text-sm">AMAZON</span>
                            </div>
                            <div className="flex items-center gap-1 text-gray-400">

                                <div className="flex gap-0.5 mb-2">
                                    <div className="w-1 h-1 bg-gray-400 rounded-full"></div>
                                    <div className="w-1 h-1 bg-gray-400 rounded-full"></div>
                                </div>
                            </div>

                                <div className="text-[12px] sm:text-[13px] font-medium border border-gray-200 rounded-full px-3 sm:px-4 py-1 sm:py-1.5">Introducing Sharrowkin</div>
                            </div>

                            <h2 className="mb-12 sm:mb-16 lg:mb-20" style={{ fontSize: 'clamp(1.5rem, 4vw, 3.2rem)', fontWeight: 500, lineHeight: 1.12, letterSpacing: '-0.02em', color: '#111' }}>
                                Strategy-led AI agent, delivering<br className="hidden sm:block" /><span className="sm:hidden"> </span>results in development and beyond.
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8">
                                <div className="hover-lift gradient-border p-6 rounded-2xl bg-white">
