<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharrowkyn — Autonomous Dev Agent</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Custom Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDialog {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .animate-fade-in-overlay {
            animation: fadeInOverlay 0.4s ease-out forwards;
        }

        .animate-slide-up-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            animation: fadeInDialog 0.5s ease-out forwards;
        }

        .bg-clip-text {
            -webkit-background-clip: text;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className, fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ fill: fill }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('plan');
            const tabs = [
                { id: 'plan', label: 'Plan', icon: 'Terminal' },
                { id: 'code', label: 'Code', icon: 'Code2' },
                { id: 'debug', label: 'Debug', icon: 'Bug' },
                { id: 'ship', label: 'Ship', icon: 'Cloud' }
            ];

            useEffect(() => {
                const interval = setInterval(() => {
                    setActiveTab((prev) => {
                        const currentIndex = tabs.findIndex(t => t.id === prev);
                        return tabs[(currentIndex + 1) % tabs.length].id;
                    });
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="max-w-7xl mx-auto">
                    {/* NAVIGATION */}
                    <nav className="px-6 py-4 flex items-center justify-between animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.1s' }}>
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 bg-black rounded-sm flex items-center justify-center">
                                <Icon name="Cpu" className="w-3 h-3 text-white" fill="white" />
                            </div>
                            <span className="text-lg font-semibold tracking-tight text-black">Sharrowkyn</span>
                        </div>
                        
                        <div className="hidden md:flex items-center gap-8">
                            <a href="#" className="text-sm text-gray-700 hover:text-black flex items-center gap-1">Capabilities <Icon name="ChevronDown" className="w-4 h-4" /></a>
                            <a href="#" className="text-sm text-gray-700 hover:text-black flex items-center gap-1">Workflows <Icon name="ChevronDown" className="w-4 h-4" /></a>
                            <a href="#" className="text-sm text-gray-700 hover:text-black">Documentation</a>
                            <a href="#" className="text-sm text-gray-700 hover:text-black">Pricing</a>
                        </div>

                        <div className="flex items-center gap-4">
                            <a href="#" className="text-sm text-gray-700 font-medium">Console Login</a>
                            <button className="bg-black text-white px-5 py-2.5 rounded-full text-sm font-medium hover:bg-gray-800 transition-colors">
                                Deploy Agent
                            </button>
                        </div>
                    </nav>

                    {/* HERO SECTION */}
                    <section className="px-6 pt-24 pb-32 text-center">
                        {/* Reviews Badge */}
                        <div className="inline-flex items-center gap-2 mb-8 animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.2s' }}>
                            <div className="w-6 h-6 border border-gray-300 rounded flex items-center justify-center">
                                <Icon name="Star" className="w-3.5 h-3.5 text-black" fill="black" />
                            </div>
                            <span className="text-sm font-medium text-black">Trusted by 5.2K+ engineering teams</span>
                        </div>

                        {/* Main Heading */}
                        <h1 className="text-6xl md:text-7xl lg:text-[80px] font-normal leading-[1.1] tracking-tight mb-5 animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.3s' }}>
                            Code Smarter. Ship Faster.<br />
                            <span className="bg-gradient-to-r from-black via-gray-500 to-gray-400 bg-clip-text text-transparent">
                                Agent Sharrowkyn.
                            </span>
                        </h1>

                        {/* Subheading */}
                        <p className="text-lg md:text-xl text-gray-600 mb-8 max-w-2xl mx-auto animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.4s' }}>
                            The autonomous developer agent that integrates with your stack to write features, fix bugs, and refactor code while you sleep.
                        </p>

                        {/* CTA */}
                        <button className="bg-black text-white px-8 py-3 rounded-full text-base font-medium hover:bg-gray-800 transition-colors mb-12 animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.5s' }}>
                            Start Building with Sharrowkyn
                        </button>

                        {/* Tab Bar */}
                        <div className="max-w-xl mx-auto mb-12 animate-fade-in-up" style={{ opacity: 0, animationDelay: '0.6s' }}>
                            <div className="bg-gray-100 rounded-lg p-1">
                                <div className="grid grid-cols-2 gap-1 md:hidden">
                                    {tabs.map((tab) => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                            className={`flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === tab.id ? 'bg-white text-black shadow-sm' : 'text-gray-600'}`}>
                                            <Icon name={tab.icon} className="w-4 h-4" /> {tab.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="hidden md:flex items-center justify-between">
                                    {tabs.map((tab, idx) => (
                                        <React.Fragment key={tab.id}>
                                            <button onClick={() => setActiveTab(tab.id)}
                                                className={`flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-md text-sm font-medium transition-all ${activeTab === tab.id ? 'bg-white text-black shadow-sm' : 'text-gray-600 hover:text-black'}`}>
                                                <Icon name={tab.icon} className="w-4 h-4" /> {tab.label}
                                            </button>
                                            {idx < tabs.length - 1 && <div className="w-px h-5 bg-gray-300 mx-1"></div>}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Video + Overlay Section */}
                        <div className="relative rounded-3xl overflow-hidden h-[400px] md:h-[500px] animate-fade-in-up bg-gray-50" style={{ opacity: 0, animationDelay: '0.7s' }}>
                            <video key="hero-video" className="w-full h-full object-cover" autoPlay loop muted playsInline>
                                <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260319_165750_358b1e72-c921-48b7-aaac-f200994f32fb.mp4" type="video/mp4" />
                            </video>

                            <div className="absolute inset-0 bg-black/10 animate-fade-in-overlay">
                                {activeTab === 'plan' && (
                                    <div className="animate-slide-up-overlay bg-white p-6 rounded-2xl shadow-2xl w-[320px] text-left">
                                        <h4 className="font-semibold mb-4 text-gray-900 flex items-center gap-2">
                                            <Icon name="Search" className="w-4 h-4" /> Scoping Sprint
                                        </h4>
                                        <div className="space-y-4">
                                            <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                                                <div className="bg-blue-600 h-full w-1/4"></div>
                                            </div>
                                            <div className="space-y-2">
                                                {['Parsing Requirements', 'Mapping Dependencies', 'Creating Task Tree', 'Architecting Solution'].map((txt, i) => (
                                                    <div key={i} className="flex items-center gap-3">
                                                        <div className={`w-4 h-4 rounded-full border ${i === 0 ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}`}></div>
                                                        <span className="text-xs text-gray-600 font-medium">{txt}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'code' && (
                                    <div className="animate-slide-up-overlay bg-white p-6 rounded-2xl shadow-2xl w-[320px] text-left">
                                        <div className="flex justify-between items-center mb-6">
                                            <h4 className="font-semibold text-gray-900">Autocoder Engine</h4>
                                            <span className="text-blue-500 text-xs font-bold bg-blue-50 px-2 py-1 rounded">Writing...</span>
                                        </div>
                                        <div className="space-y-3">
                                            <div className="h-3 w-full bg-gray-100 rounded"></div>
                                            <div className="h-3 w-[80%] bg-gray-100 rounded"></div>
                                            <div className="h-3 w-[90%] bg-blue-50 rounded"></div>
                                            <div className="h-3 w-[60%] bg-gray-100 rounded"></div>
                                        </div>
                                        <div className="mt-6 flex items-center justify-between text-[10px] text-gray-400 font-mono">
                                            <span>index.tsx</span>
                                            <span>1.2k lines generated</span>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'debug' && (
                                    <div className="animate-slide-up-overlay bg-white p-8 rounded-2xl shadow-2xl w-[300px] text-center">
                                        <div className="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <Icon name="ShieldCheck" className="w-8 h-8 text-red-500" />
                                        </div>
                                        <h4 className="font-bold text-xl mb-1 text-gray-900">Zero Vulnerabilities</h4>
                                        <p className="text-gray-500 text-sm mb-4">Security & Logic check</p>
                                        <div className="text-3xl font-mono font-bold text-green-600">PASSED</div>
                                        <div className="text-[10px] uppercase tracking-widest text-gray-400 mt-2">Unit tests: 100% Coverage</div>
                                    </div>
                                )}

                                {activeTab === 'ship' && (
                                    <div className="animate-slide-up-overlay bg-white p-6 rounded-2xl shadow-2xl w-[320px] text-left">
                                        <h4 className="font-semibold mb-4 text-gray-900">Continuous Deployment</h4>
                                        <div className="space-y-3 mb-6">
                                            {['Merge conflict resolved', 'PR #412 approved', 'Environment synced', 'Production Ready'].map((text, i) => (
                                                <div key={i} className="flex items-center gap-3">
                                                    <Icon name="CheckCircle2" className="w-4 h-4 text-green-500" />
                                                    <span className="text-sm text-gray-600">{text}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <button className="w-full bg-black text-white py-2.5 rounded-xl font-medium text-sm">
                                            Push to Vercel
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Company Logos */}
                        <div className="mt-24 flex flex-wrap items-center justify-center gap-x-12 gap-y-8 opacity-0 animate-fade-in-up" style={{ animationDelay: '0.8s' }}>
                            <span className="font-bold text-xl tracking-tighter text-gray-400">GITHUB</span>
                            <div className="flex items-center gap-1 font-bold text-xl text-gray-400">
                                <Icon name="Hash" className="w-5 h-5" /> SLACK
                            </div>
                            <div className="flex items-center gap-1 text-gray-400">
                                <div className="grid grid-cols-2 gap-0.5">
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                                </div>
                                <span className="font-semibold text-lg">Linear</span>
                            </div>
                            <span className="font-serif italic text-2xl text-gray-400 font-bold">Vercel</span>
                            <div className="flex items-center gap-2 text-gray-400 font-medium">
                                <div className="w-8 h-8 border-2 border-gray-400 rounded-full flex items-center justify-center text-[10px] font-bold">AWS</div>
                                <span className="tracking-widest text-sm">AMAZON</span>
                            </div>
                            <div className="flex items-center gap-1 text-gray-400">
                                <span className="font-bold text-xl tracking-tight">PostHog</span>
                                <div className="flex gap-0.5 mb-2">
                                    <div className="w-1 h-1 bg-gray-400 rounded-full"></div>
                                    <div className="w-1 h-1 bg-gray-400 rounded-full"></div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
